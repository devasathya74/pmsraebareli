<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication | Admin | पुलिस मॉडर्न स्कूल</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/logo/logo.png">
    <link rel="apple-touch-icon" href="../assets/images/logo/logo.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">

    <!-- Responsive CSS Framework -->
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        html {
            font-size: 90%;
        }

        body {
            font-family: 'Poppins', 'Tiro Devanagari Hindi', sans-serif;
            line-height: 1.8;
        }

        .container {
            max-width: 100% !important;
            padding-left: 2rem !important;
            padding-right: 2rem !important;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .tab-btn {
            background: white;
            color: #1f2937;
        }

        .tab-btn.active {
            background: #1e3a8a !important;
            color: white !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .page-nav-btn {
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: #4b5563;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-nav-btn:hover {
            background-color: #f9fafb;
            color: #1e3a8a;
        }
        .page-nav-btn.active {
            color: #1e3a8a;
            border-bottom-color: #1e3a8a;
            background-color: #eff6ff;
        }
            h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </head>

<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">Admin Dashboard</h1>
                    <p class="text-blue-200 text-sm">कम्युनिकेशन एवं नोटिफिकेशन्स</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button onclick="toggleUserDropdown()" class="flex items-center gap-2 focus:outline-none">
                            <span id="user-name" class="text-sm font-semibold hidden md:block text-blue-100">Loading...</span>
                            <div class="w-8 h-8 rounded-full bg-blue-700 flex items-center justify-center border-2 border-blue-400">
                                <i class="fas fa-user text-sm"></i>
                            </div>
                            <i class="fas fa-chevron-down text-xs text-blue-300"></i>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl z-50 border border-gray-100 py-1">
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Signed in as</p>
                                <p id="dropdown-user-email" class="text-sm font-medium text-gray-900 truncate">user@example.com</p>
                            </div>
                            <a href="#" onclick="openChangePasswordModal()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-key w-4 text-gray-400 mr-2"></i>Change Password
                            </a>
                            <div class="border-t border-gray-100 my-1"></div>
                            <a href="#" onclick="authHelper.logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fas fa-sign-out-alt w-4 text-red-400 mr-2"></i>Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Group Navigation -->
    <div class="bg-white border-b shadow-sm sticky top-[72px] z-40 overflow-x-auto no-scrollbar">
        <div class="container mx-auto px-6 flex">
            <a href="admin-dashboard.html" class="page-nav-btn" id="nav-dash">
                <i class="fas fa-th-large"></i> Main
            </a>
            <a href="admin-students.html" class="page-nav-btn" id="nav-students">
                <i class="fas fa-users"></i> Students
            </a>
            <a href="admin-messages.html" class="page-nav-btn active" id="nav-messages">
                <i class="fas fa-envelope"></i> Communication
            </a>
            <a href="admin-monitor.html" class="page-nav-btn" id="nav-monitor">
                <i class="fas fa-desktop"></i> Monitor
            </a>
            <a href="admin-inventory.html" class="page-nav-btn" id="nav-inventory">
                <i class="fas fa-boxes"></i> Inventory
            </a>
        </div>
    </div>

    <div class="container mx-auto px-6 py-8">
        <div class="bg-white rounded-xl shadow-lg mb-8 overflow-hidden">
            <div class="flex overflow-x-auto no-scrollbar border-b">
                <button onclick="switchTab('messages')" class="tab-btn active px-8 py-4 font-bold transition-colors hover:bg-gray-50 whitespace-nowrap">
                    <i class="fas fa-envelope mr-2"></i>Website Messages
                </button>
                <button onclick="switchTab('notifications')" class="tab-btn px-8 py-4 font-bold transition-colors hover:bg-gray-50 whitespace-nowrap">
                    <i class="fas fa-bell mr-2"></i>Global Notifications
                </button>
            </div>

            <!-- Messages Tab -->
            <div id="messages-tab" class="tab-content active p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-gray-800">Contact Inquiries</h3>
                    <select id="message-filter" onchange="filterMessages()" class="px-4 py-2 border rounded-lg outline-none">
                        <option value="all">All Messages</option>
                        <option value="new">Unread Only</option>
                        <option value="read">Archived</option>
                    </select>
                </div>
                <div id="messages-list" class="space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Notifications Tab -->
            <div id="notifications-tab" class="tab-content p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-6">Create New Notification</h3>
                <form id="notification-form" class="bg-blue-50 p-6 rounded-xl border border-blue-100 mb-8 max-w-2xl">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">Select Icon</label>
                            <select id="notif-icon" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="fa-bell">🔔 Bell (General)</option>
                                <option value="fa-bullhorn">📢 Bullhorn (Announcement)</option>
                                <option value="fa-exclamation-triangle">⚠️ Warning (Urgent)</option>
                                <option value="fa-info-circle">ℹ️ Info (Update)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">Message Detail *</label>
                            <textarea id="notif-message" required rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter notification content..."></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg hover:bg-blue-800 shadow-md">
                            Post Notification
                        </button>
                    </div>
                </form>

                <h3 class="text-xl font-bold text-gray-800 mb-4">Active Notifications</h3>
                <div id="notifications-list" class="space-y-3">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="change-password-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-[70] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md" id="password-modal-content">
            <div class="p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-6">Change Password</h2>
                <form id="change-password-form" onsubmit="handlePasswordChange(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                        <input type="password" id="current-password" required class="w-full px-4 py-2 border rounded-lg shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                        <input type="password" id="new-password" required minlength="6" class="w-full px-4 py-2 border rounded-lg shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                        <input type="password" id="confirm-password" required minlength="6" class="w-full px-4 py-2 border rounded-lg shadow-sm">
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeChangePasswordModal()" class="flex-1 bg-gray-100 py-2.5 rounded-lg">Cancel</button>
                        <button type="submit" id="save-password-btn" class="flex-1 bg-blue-900 text-white py-2.5 rounded-lg font-bold">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initDashboard } from '../assets/js/admin-dashboard.js';
        window.addEventListener('load', () => {
            initDashboard();
        });
    </script>
</body>
</html>
