    <!-- JavaScript for Navbar Scroll Effect and Mobile Menu -->
    <script>
        const navbar = document.getElementById('navbar');
        const mobileMenuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const links = document.querySelectorAll('a[href^="#"]');

        // Scroll Effect
        // Scroll Effect removed to keep header consistent
        // window.addEventListener('scroll', () => { ... });

        // Mobile Menu Toggle
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            const icon = mobileMenuBtn.querySelector('i');
            if (mobileMenu.classList.contains('open')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Close mobile menu when clicking on a link (smooth scroll handled by main.js)
        links.forEach(link => {
            link.addEventListener('click', function () {
                mobileMenu.classList.remove('open');
                const icon = mobileMenuBtn.querySelector('i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            });
        });

    </script>

    <!-- AOS (Animate On Scroll) - Loading Delayed (Phase 5) -->
    <script>
        window.addEventListener('load', () => {
            const s = document.createElement('script');
            s.src = "https://unpkg.com/aos@2.3.1/dist/aos.js";
            s.defer = true;
            s.onload = () => {
                AOS.init({
                    duration: 800,
                    once: true,
                    disable: 'mobile'
                });
            };
            document.body.appendChild(s);
        });
    </script>

    <!-- About Section Toggle Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const aboutToggleBtn = document.getElementById('about-toggle-btn');
            const aboutContentExpanded = document.getElementById('about-content-expanded');

            if (aboutToggleBtn && aboutContentExpanded) {
                aboutToggleBtn.addEventListener('click', () => {
                    const isHidden = aboutContentExpanded.classList.contains('hidden');

                    if (isHidden) {
                        aboutContentExpanded.classList.remove('hidden');
                        aboutToggleBtn.innerHTML = 'Show Less <i class="fas fa-chevron-up ml-2" id="about-toggle-icon"></i>';
                    } else {
                        aboutContentExpanded.classList.add('hidden');
                        aboutToggleBtn.innerHTML = 'Learn More <i class="fas fa-chevron-down ml-2" id="about-toggle-icon"></i>';
                    }
                });
            }
        });
    </script>
