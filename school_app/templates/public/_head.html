        .gallery-img {
            transition: transform 0.3s ease;

        }

        .swiper {

            padding-top: 50px;
            padding-bottom: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 300px;
            height: 400px;
            border-radius: 15px;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .swiper-3d .swiper-slide-shadow-left,
        .swiper-3d .swiper-slide-shadow-right {
            border-radius: 15px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0));
        }

        .gallery-container {
            max-width: 950px;
            margin: 0 auto;
            position: relative;
        }

        .gallery-slider-wrapper {
            overflow: scroll;
            border-radius: 16px;
        }

        .gallery-track {
            display: flex;
            height: 100%;
        }

        .gallery-item {
            flex: 0 0 auto;
            width: 300px;
            height: 400px;
            margin: 0 -30px;
            position: relative;
            z-index: 1;
        }

        .gallery-item:first-child { margin-left: 0; }
        .gallery-item:last-child { margin-right: 0; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .gallery-item:nth-child(3n+2) {
            z-index: 2;
            transform: scale(1.05);
        }

        .gallery-nav {
            border: none;
            outline: none;
            cursor: pointer;
        }

        .gallery-nav:hover { transform: scale(1.1); }
        .gallery-nav.prev { left: 20px; }

    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                const cdnStatus = {
                    tailwind: document.querySelector('link[href*="tailwindcss"]') !== null,
                    fontAwesome: document.querySelector('link[href*="font-awesome"]') !== null,
                    aos: typeof AOS !== 'undefined'
                };

                console.log('CDN Loading Status:', cdnStatus);

                if (!cdnStatus.tailwind) {
                    console.warn('⚠️ Tailwind CSS failed to load - styles may not work correctly');
                } else {
                    console.log('✅ Tailwind CSS loaded successfully from jsDelivr');
                }
                if (!cdnStatus.fontAwesome) {
                    console.warn('⚠️ Font Awesome failed to load - icons may not display');
                } else {
                    console.log('✅ Font Awesome loaded successfully');
                }
                if (!cdnStatus.aos) {
                    console.warn('⚠️ AOS (Animate On Scroll) failed to load - animations may not work');
                }

                if (cdnStatus.tailwind && cdnStatus.fontAwesome) {
                    console.log('✅ All critical CDN resources loaded successfully');
                }
            }, 500);
        });
    </script>
