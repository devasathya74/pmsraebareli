{% extends "base.html" %}

{% block title %}Students & Teachers | Admin{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-8">
    <div class="bg-white rounded-xl shadow-lg mb-8 overflow-hidden">
        <div class="flex overflow-x-auto no-scrollbar border-b">
            <button onclick="switchTab('students')" class="tab-btn active px-8 py-4 font-bold transition-colors hover:bg-gray-50 whitespace-nowrap">
                <i class="fas fa-user-graduate mr-2"></i>Students List
            </button>
            <button onclick="switchTab('teachers')" class="tab-btn px-8 py-4 font-bold transition-colors hover:bg-gray-50 whitespace-nowrap">
                <i class="fas fa-chalkboard-teacher mr-2"></i>Teachers List
            </button>
        </div>

        <!-- Students Tab -->
        <div id="students-tab" class="tab-content active p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <h3 class="text-xl font-bold text-gray-800">Student Directory</h3>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="text" id="student-search" oninput="searchStudents()" placeholder="Search name/roll..."
                            class="pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-64">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                    <select id="class-filter" onchange="filterStudents()" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="all">All Classes</option>
                        <option value="lkg">LKG</option>
                        <option value="ukg">UKG</option>
                        {% for i in range(1, 9) %}
                        <option value="{{ i }}">{{ i }}</option>
                        {% endfor %}
                    </select>
                    <button onclick="openAddStudentModal()" class="bg-blue-900 text-white px-4 py-2 rounded-lg hover:bg-blue-800">
                        <i class="fas fa-plus mr-2"></i>New Student
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg border">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-gray-700 font-bold">
                        <tr>
                            <th class="px-6 py-4">Photo</th>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Roll No</th>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Class</th>
                            <th class="px-6 py-4">Father Name</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Teachers Tab -->
        <div id="teachers-tab" class="tab-content p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <h3 class="text-xl font-bold text-gray-800">Faculty Management</h3>
                <div class="flex flex-wrap gap-2">
                    <button onclick="openAddTeacherModal()" class="bg-blue-900 text-white px-4 py-2 rounded-lg hover:bg-blue-800">
                        <i class="fas fa-plus mr-2"></i>New Teacher
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg border">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-gray-700 font-bold">
                        <tr>
                            <th class="px-6 py-4">Photo</th>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Email</th>
                            <th class="px-6 py-4">Subject</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teachers-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="student-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4 overflow-y-auto"></div>
<div id="teacher-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4 overflow-y-auto"></div>

<!-- Salary Slip Modal -->
<div id="salary-slip-modal"
    class="hidden fixed inset-0 bg-black bg-opacity-70 z-[70] flex items-start justify-center p-4 overflow-y-auto"
    style="backdrop-filter: blur(8px); padding-top: var(--ledger-top-offset, 120px);">
    <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full flex flex-col max-h-[94vh] shadow-blue-900/20">
        <div class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center rounded-t-2xl flex-shrink-0">
            <h3 class="text-xl font-bold"><i class="fas fa-file-invoice-dollar mr-2"></i>Teacher Salary Slip</h3>
            <div class="flex gap-2">
                <button onclick="printSalarySlip()"
                    class="bg-white text-blue-900 px-4 py-1.5 rounded-lg font-bold hover:bg-gray-100 transition-colors">
                    <i class="fas fa-print mr-2"></i>Print Slip
                </button>
                <button onclick="document.getElementById('salary-slip-modal').classList.add('hidden')" class="text-white hover:text-gray-200">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
        </div>
        <div class="p-8 bg-gray-50 flex-1 overflow-y-auto" id="salary-slip-content">
            <!-- Content populated by JS -->
        </div>
    </div>
</div>

<script type="module">
    import { initDashboard } from "{{ url_for('static', filename='assets/js/admin-dashboard.js') }}";
    window.addEventListener('load', () => {
        initDashboard();
        // Force Switch to students tab
        if(window.switchTab) switchTab('students');
    });
</script>
{% endblock %}
