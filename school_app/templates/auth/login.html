<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | {{ school_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[linear-gradient(160deg,_#0f172a,_#1e293b_60%,_#164e63)] text-white">
    <div class="mx-auto flex min-h-screen max-w-6xl items-center px-6 py-12">
        <div class="grid w-full gap-8 md:grid-cols-2">
            <div class="rounded-[2rem] border border-white/10 bg-white/10 p-10 backdrop-blur">
                <p class="text-sm uppercase tracking-[0.3em] text-amber-300">Secure Access</p>
                <h1 class="mt-4 text-4xl font-black">{{ school_name }}</h1>
                <p class="mt-4 text-slate-200">
                    Admin and teachers can sign in with session-controlled access. Only one active session per user
                    is allowed, and inactive sessions expire automatically.
                </p>
                <a class="mt-8 inline-flex rounded-full bg-white px-5 py-3 text-sm font-bold text-slate-900" href="{{ url_for('public.index') }}">Back to Website</a>
            </div>
            <div class="rounded-[2rem] bg-white p-8 text-slate-900 shadow-2xl">
                {% include "partials/flash.html" %}
                <h2 class="text-2xl font-bold">Internal Login</h2>
                <form class="mt-8 space-y-5" method="post">
                    <div>
                        <label class="mb-2 block text-sm font-semibold">Username</label>
                        <input class="w-full rounded-2xl border border-slate-200 px-4 py-3" name="username" required>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold">Password</label>
                        <input class="w-full rounded-2xl border border-slate-200 px-4 py-3" name="password" type="password" required>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold">Captcha: {{ challenge }}</label>
                        <input class="w-full rounded-2xl border border-slate-200 px-4 py-3" name="captcha_answer" inputmode="numeric" required>
                    </div>
                    <button class="w-full rounded-2xl bg-slate-900 px-5 py-3 font-semibold text-white" type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
