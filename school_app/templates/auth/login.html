<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Staff Login | पुलिस मॉडर्न स्कूल, रायबरेली</title>
    <meta name="csrf-token" content="{{ session.csrf_token }}">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='assets/images/logo/logo1.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='assets/images/logo/logo1.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='assets/images/logo/logo1.png') }}">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1e3a8a',
                        royal: '#3b82f6'
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Hindi Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', 'Tiro Devanagari Hindi', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        h1, h2, h3 { font-family: 'Nunito', sans-serif; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-12">

    <div class="max-w-md w-full">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="bg-white w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl p-2">
                <img src="{{ url_for('static', filename='assets/images/logo/logo1.png') }}" alt="PMS Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-2 leading-tight">पुलिस मॉडर्न स्कूल</h1>
            <p class="text-blue-200">Admin/Principal Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">लॉगिन करें</h2>

            <form id="login-form" class="space-y-6">
                <!-- Email/Phone -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-user mr-2"></i>ईमेल या मोबाइल नंबर
                    </label>
                    <input type="text" id="username" placeholder="example@email.com या 9876543210"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-900 focus:outline-none transition-colors"
                        required>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-lock mr-2"></i>पासवर्ड
                    </label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="अपना पासवर्ड दर्ज करें"
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-900 focus:outline-none transition-colors"
                            required>
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- CAPTCHA -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-shield-alt mr-2"></i>सुरक्षा कोड (CAPTCHA)
                    </label>
                    <div class="flex gap-3 items-center">
                        <div id="captcha-display"
                            class="flex-1 bg-gradient-to-r from-blue-100 to-blue-50 border-2 border-blue-300 rounded-lg px-4 py-3 text-center font-bold text-2xl text-blue-900 select-none tracking-wider"
                            style="font-family: 'Courier New', monospace; letter-spacing: 8px;">
                            <!-- CAPTCHA will be generated here -->
                        </div>
                        <button type="button" onclick="generateCaptcha()"
                            class="bg-blue-900 text-white px-4 py-3 rounded-lg hover:bg-blue-800 transition-colors"
                            title="नया कोड जनरेट करें">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <input type="text" id="captcha-input" placeholder="ऊपर दिखाया गया कोड यहाँ दर्ज करें" maxlength="6"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-900 focus:outline-none transition-colors mt-2"
                        required autocomplete="off">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="mr-2">
                        <span class="text-sm text-gray-600">मुझे याद रखें</span>
                    </label>
                    <a href="#" class="text-sm text-blue-900 hover:underline">पासवर्ड भूल गए?</a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition-colors shadow-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i>लॉगिन करें
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">या</span>
                </div>
            </div>

            <!-- Quick Links -->
            <div class="space-y-3">
                <a href="{{ url_for('public.index') }}"
                    class="block w-full text-center py-2 border-2 border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    <i class="fas fa-home mr-2"></i>होम पेज पर जाएं
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { authHelper, firestoreHelper } from "{{ url_for('static', filename='assets/js/firebase-config.js') }}";

        // CAPTCHA System
        async function generateCaptcha() {
            const captcha = await authHelper.getLoginCaptcha(true);
            document.getElementById('captcha-display').textContent = captcha || '------';
            document.getElementById('captcha-input').value = '';
        }

        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        };

        window.generateCaptcha = generateCaptcha;

        // Generate CAPTCHA on page load
        window.addEventListener('load', function () {
            generateCaptcha();
        });

        // Check if user is already logged in
        authHelper.onAuthChange(async (user) => {
            if (user) {
                if (user.role === 'admin' || user.role === 'principal') {
                    window.location.href = "{{ url_for('admin.dashboard') }}";
                } else if (user.role === 'teacher') {
                    window.location.href = "{{ url_for('teacher.dashboard') }}";
                }
            }
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha-input').value;
            const submitButton = e.target.querySelector('button[type="submit"]');

            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>लॉगिन हो रहा है...';

            try {
                let email = username;
                if (!username.includes('@')) {
                    email = `${username}@pmsraebareli.online`;
                }

                const result = await authHelper.login(email, password, captcha);

                if (result.success) {
                    const user = result.user;
                    const role = user.role;

                    if (role === 'teacher') {
                        window.location.href = "{{ url_for('teacher.dashboard') }}";
                    } else {
                        window.location.href = "{{ url_for('admin.dashboard') }}";
                    }
                } else {
                    alert('लॉगिन विफल: ' + (result.error || 'अमान्य विवरण'));
                    await generateCaptcha();
                    submitButton.disabled = false;
                    submitButton.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>लॉगिन करें';
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('कुछ गलत हो गया। कृपया पुनः प्रयास करें।');
                await generateCaptcha();
                submitButton.disabled = false;
                submitButton.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>लॉगिन करें';
            }
        });
    </script>
</body>
</html>
