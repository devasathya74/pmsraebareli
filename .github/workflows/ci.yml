name: CI Health Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Health Check
      env:
        # These would normally be set in Repository Secrets
        HEALTH_CHECK_BASE_URL: "http://localhost:5000"
        SECRET_KEY: "dummy-key-for-headless-check"
      run: |
        # Note: In a real CI, you'd need a running dev server or 
        # use the python script to check internal logic if connectivity is skipped.
        # For now, we verify dependencies and script syntax.
        python health_check.py --ci-mode
